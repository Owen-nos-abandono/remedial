name: Despliegue Zero-To-Hero Blue-Green

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # CORRECCIÓN: Convertimos el nombre del repositorio a minúsculas para Docker
      - name: Downcase Repo Name
        run: |
          echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.REPO_LC }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Execute Blue-Green Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_DOCKER_SERVER_IP }}
          username: riveradiazjanine
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          script: |
            # 1. Convertir nombre del repo a minúsculas también en el script de bash
            REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            
            # 2. Detectar cuál contenedor está activo para decidir el nuevo color
            if [ "$(docker ps -q -f name=app-blue)" ]; then
              NEW_COLOR="green"
              NEW_PORT="8081"
              OLD_COLOR="blue"
            else
              NEW_COLOR="blue"
              NEW_PORT="8080"
              OLD_COLOR="green"
            fi

            echo "Desplegando versión $NEW_COLOR en el puerto $NEW_PORT..."

            # 3. Descargar la imagen más reciente
            docker pull ghcr.io/$REPO_LOWER:latest

            # 4. Limpiar si existe un contenedor viejo del mismo color
            docker stop app-$NEW_COLOR || true
            docker rm app-$NEW_COLOR || true

            # 5. Levantar el nuevo contenedor
            docker run -d --name app-$NEW_COLOR -p $NEW_PORT:8080 \
              --restart always \
              ghcr.io/$REPO_LOWER:latest

            # 6. Esperar a que la app arranque (Grace period)
            sleep 15

            # 7. CAMBIO DE TRÁFICO: Actualizar Nginx en la otra VM
            # Usamos la IP interna 10.0.2.3 para saltar al servidor Nginx
            ssh -o StrictHostKeyChecking=no riveradiazjanine@10.0.2.3 \
            "sudo sed -i 's/server 10.0.1.2:.*/server 10.0.1.2:$NEW_PORT;/' /etc/nginx/sites-available/default && sudo systemctl reload nginx"

            # 8. Limpiar la versión antigua
            docker stop app-$OLD_COLOR || true
            docker rm app-$OLD_COLOR || true
            
            echo "Despliegue Blue-Green completado con éxito."