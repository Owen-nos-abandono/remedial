name: Deploy Blue-Green Remedial

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Usamos el nombre del paquete que ya tienes en GitHub
          tags: ghcr.io/owen-nos-abandono/remedial:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Execute Blue-Green Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          # Verifica que estos nombres coincidan con tus Secrets en GitHub
          host: ${{ secrets.GCP_DOCKER_SERVER_IP }}
          username: riveradiazjanine
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Detectar cuál contenedor está activo para decidir el nuevo color
            if [ "$(docker ps -q -f name=app-blue)" ]; then
              NEW_COLOR="green"
              NEW_PORT="8081"
              OLD_COLOR="blue"
            else
              NEW_COLOR="blue"
              NEW_PORT="8080"
              OLD_COLOR="green"
            fi

            echo "Desplegando versión $NEW_COLOR en el puerto $NEW_PORT..."

            # 2. Descargar la imagen más reciente
            docker pull ghcr.io/owen-nos-abandono/remedial:latest

            # 3. Limpiar si existe un contenedor previo del mismo color
            docker stop app-$NEW_COLOR || true
            docker rm app-$NEW_COLOR || true

            # 4. Levantar el nuevo contenedor
            docker run -d --name app-$NEW_COLOR -p $NEW_PORT:8080 \
              --restart always \
              ghcr.io/owen-nos-abandono/remedial:latest

            # 5. Esperar a que la app arranque
            sleep 15

            # 6. CAMBIO DE TRÁFICO: Actualizar Nginx en la VM 10.0.2.3
            ssh -o StrictHostKeyChecking=no riveradiazjanine@10.0.2.3 \
            "sudo sed -i 's/server 10.0.1.2:.*/server 10.0.1.2:$NEW_PORT;/' /etc/nginx/sites-available/default && sudo systemctl reload nginx"

            # 7. Limpiar la versión antigua
            docker stop app-$OLD_COLOR || true
            docker rm app-$OLD_COLOR || true
            
            echo "Despliegue Blue-Green completado con éxito."